<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Pages Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #555;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #0077ff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #005fd1;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hello 👋</h1>
    <p>This is my first static website hosted on GitHub Pages.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage(){
    alert("Your GitHub Pages site is working! 🚀");
}
</script>

</body>
</html>
